        content="Track our real-time vanlife journey across Italy and beyond. Experience the adventure through our interactive Mission Control radar and base camp discoveries.">

    <!-- Immediate Theme Application -->
    <script>
        (function () {
            let theme = 'light';
            try {
                const savedTheme = localStorage.getItem('theme');
                const systemPrefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches;
                theme = savedTheme || (systemPrefersDark ? 'dark' : 'light');
            } catch (e) {
                console.warn("Theme storage access failed:", e);
            }
            document.documentElement.setAttribute('data-theme', theme);
        })();
    </script>

    <!-- Open Graph -->
    <meta property="og:title" content="YatrAmore | YA-VanLife">
    <meta property="og:description" content="Mission Control: Tracking our van journey base by base.">

    <meta property="og:url" content="https://www.yatramore.com/van-life">

    <!-- Site Styles -->
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="our-journey.css">
    <link rel="stylesheet" href="van-life.css">

<body class="van-life-page">
    <!-- Navigation (rendered by components.js) -->
    <nav id="navbar"></nav>

    <main>
        <!-- Page Hero (Standardized) -->
        <section class="travel-hero">
            <div class="travel-hero-content">
                <div class="travel-hero-tag">
                    <i class="fas fa-satellite-dish"></i> Mission Control
                </div>
                <h1>Our VanLife</h1>
                <p>Tracking our van journey, base by base. Discover our hidden camp locations through the tactical radar
                    scan.</p>
            </div>
            <div class="hero-scroll-indicator">
                <span></span>
            </div>
        </section>

        <!-- Mission Map -->
        <section class="map-section">
            <div class="map-container-wrapper">
                <div id="van-map"></div>
            </div>

            <!-- Tactical Stats Grid -->
            <div class="map-stats-grid">
                <div class="stat-card glass">
                    <i class="fas fa-route"></i>
                    <span class="stat-value" id="stat-distance">0 km</span>
                </div>
                <div class="stat-card glass">
                    <i class="fas fa-clock"></i>
                    <span class="stat-value" id="stat-time">0h 0m</span>
                </div>
                <div class="stat-card glass">
                    <i class="fas fa-campground"></i>
                    <span class="stat-value" id="stat-camping">0</span>
                </div>
                <div class="stat-card glass">
                    <i class="fas fa-satellite"></i>
                    <div class="stat-lock-container">
                        <span class="stat-value" id="stat-lock">Optimal</span>
                        <div class="signal-bars">
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                            <div class="bar"></div>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <!-- Footer (rendered by components.js) -->
    <footer></footer>

    <!-- Accessibility & Translation (rendered by components.js) -->
    <div class="accessibility-container"></div>

    <!-- Leaflet JS -->
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://unpkg.com/leaflet-routing-machine@3.2.12/dist/leaflet-routing-machine.js"></script>

    <!-- Site Components -->
    <script src="components.js"></script>
    <script src="van-life.js"></script>

    <script>
        // Synchronize with YatrAmore Global Engine
        YatrAmore.renderNav('van-life'); // Correct 'van-life' active state
        YatrAmore.renderFooter();
        YatrAmore.renderAccessibility();
        YatrAmore.renderGoogleTranslate();
        YatrAmore.loadCore();
    </script>
</body>

</html>
